server {
    listen 80;
    server_name meet-hqnb.cmcati.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name meet-hqnb.cmcati.vn;

    ssl_certificate /etc/letsencrypt/live/meet-hqnb.cmcati.vn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/meet-hqnb.cmcati.vn/privkey.pem; # managed by Certbot

    # Hỗ trợ upload file lớn (nếu cần cho Jitsi/Whiteboard)
    client_max_body_size 100M;

    location / {
        proxy_pass https://10.1.6.52:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}